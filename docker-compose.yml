# FastAPI Starter Template — Production Docker Compose
# One-command deployment:  cp .env.example .env && docker compose up -d
#
# .env is the single source of truth for configuration:
#   - build args  → forwarded below via ${VAR} substitution (compose auto-loads .env)
#   - runtime env → injected into the container via env_file below
# Add a variable to .env and it flows to the container at run time with no extra wiring;
# add it to `args` only if the Dockerfile needs it at build time.

services:
  app:
    build:
      context: .
      args:
        PORT: ${PORT:-8000}

    ports:
      - '${PORT:-8000}:${PORT:-8000}'

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test:
        [
          'CMD',
          'uv',
          'run',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8000}/api/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
